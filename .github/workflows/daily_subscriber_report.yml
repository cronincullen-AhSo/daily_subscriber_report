name: Daily Subscriber Report

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install PyMySQL sendgrid
      - name: Run report
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REVENUE_CAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          REPORT_RECIPIENT: taylor.shurte@castability.actor
          REPORT_SENDER: cronin.cullen@castability.actor
        run: python report.py
