name: Daily Subscriber Report

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install psycopg2-binary sendgrid
      - name: Run report
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REVENUE_CAT_API_KEY: ${{ secrets.REVENUE_CAT_API_KEY }}
          REPORT_RECIPIENT: taylor.shurte@castability.actor
          REPORT_SENDER: cronin.cullen@castability.actor
        run: python report.py
